name: bun.nix sync

# bun.nix is bun2nix's generated mirror of bun.lock — the nix build installs
# deps from it (nix/r3.nix fetchBunDeps), never from the registry. Locally the
# package.json postinstall hook regenerates it on every `bun install` (the
# wasm bun2nix is an exact-pinned devDependency), but Dependabot never runs
# lifecycle scripts, so its bun bumps arrive with a stale bun.nix. Here a
# plain `bun install` runs the same postinstall — the same integrity-locked
# generator as everywhere else — and then this workflow:
#   - same-repo Dependabot PR: commits the regenerated file to the PR branch
#     and re-dispatches CI on it — a GITHUB_TOKEN push doesn't trigger
#     workflows by itself, and a required `check` must land on the new head;
#   - anything else (human PR, fork PR, push to main): fails with
#     instructions — we can't (forks) or shouldn't (humans) push to those.
on:
  pull_request:
    paths: [bun.lock, bun.nix, flake.lock]
  push:
    branches: [main]
    paths: [bun.lock, bun.nix, flake.lock]

permissions:
  contents: write # push the regenerated bun.nix to a Dependabot PR branch
  actions: write # re-dispatch ci.yml on the synced commit

concurrency:
  group: bun-nix-${{ github.ref }}
  cancel-in-progress: true

# `shell: bash` (vs the unspecified default) adds -o pipefail.
defaults:
  run:
    shell: bash

# Third-party actions are pinned to commit SHAs (the trailing comment is the
# tag): a tag can be force-moved to malicious code, a SHA can't.
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # The fix path needs the PR head branch itself — the default
          # pull_request checkout is a detached merge commit we can't push. A
          # fork's head branch doesn't exist here, so only same-repo PRs get
          # it (forks take the default and can only reach the verify path).
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref || '' }}
          # Never leave the token in .git/config: bun install + bun2nix run
          # below on Dependabot-influenced input (bun.lock is shaped by
          # registry metadata), and they must not execute with a write
          # credential on disk. The push step injects the token into its own
          # git invocation only.
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      # The install's postinstall hook regenerates bun.nix with the wasm
      # bun2nix from node_modules — exact-pinned in package.json and
      # integrity-locked in bun.lock, the same generator every other
      # environment uses, so a diff is meaningful, not generator noise.
      - name: Regenerate bun.nix
        run: bun install --frozen-lockfile

      - name: Push the fix (Dependabot) or fail with instructions
        env:
          GH_TOKEN: ${{ github.token }}
          CAN_FIX: ${{ github.actor == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- bun.nix; then
            echo "bun.nix is in sync with bun.lock."
            exit 0
          fi
          if [ "$CAN_FIX" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: regenerate bun.nix" -- bun.nix
            # Token scoped to this one command (checkout persists nothing);
            # the value is auto-masked in logs.
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:$HEAD_REF"
            gh workflow run ci.yml --ref "$HEAD_REF"
            echo "Pushed the regenerated bun.nix and dispatched CI onto the synced commit."
          else
            git --no-pager diff --stat -- bun.nix
            echo "::error::bun.nix is out of sync with bun.lock — run 'bun install' (its postinstall regenerates bun.nix) and commit the result."
            exit 1
          fi
