name: Nightly

# A daily full 4-target cross-compile published as a single rolling `nightly`
# GitHub pre-release (assets only — NOT npm). Rationale: the launcher resolves a
# version-pinned platform package from npm, so it never fetches nightly assets;
# publishing a nightly to npm under the stable version would be a correctness bug.
# The binaries are self-contained, so nightly users download the asset for their
# platform and run it directly, or point the launcher at it:
#   R3_BINARY=./r3-linux-x64 npx @hyperlogue/r3 --help
# This also doubles as a daily build smoke that PR CI deliberately skips.
on:
  schedule:
    - cron: '17 6 * * *' # 06:17 UTC — off the hour (GitHub delays :00 jobs); runners are UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: false

# `shell: bash` (vs the unspecified default) adds -o pipefail.
defaults:
  run:
    shell: bash

# Third-party actions are pinned to commit SHAs (the trailing comment is the
# tag): a tag can be force-moved to malicious code, a SHA can't.
jobs:
  nightly:
    # Don't run the schedule in forks/mirrors — they'd move a `nightly` tag and
    # mint releases on their copy.
    if: github.repository == 'hyperlogue/r3' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # need history + the `nightly` tag for the skip guard
          # credentials stay: this job pushes the moved `nightly` tag

      # Skip identical rebuilds: the job force-moves `nightly` to the built commit,
      # so if HEAD already is that commit there's nothing new to ship.
      - name: Skip if no new commits since last nightly
        id: guard
        run: |
          git fetch origin tag nightly --force >/dev/null 2>&1 || true
          LAST=$(git rev-parse -q --verify refs/tags/nightly^{commit} || true)
          if [ "$(git rev-parse HEAD)" = "$LAST" ]; then
            echo "No new commits since the last nightly — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.guard.outputs.skip != 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - if: steps.guard.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - if: steps.guard.outputs.skip != 'true'
        name: Typecheck + lint
        run: |
          bun run typecheck
          bunx @biomejs/biome@2.4.15 check .

      # Stamp a semver-prerelease nightly version into BOTH version sources (in the
      # workspace only, never committed) so the binaries self-identify via
      # /api/health and the CLI skew-warning. Both files are stamped because
      # release-binaries.ts hard-fails when they disagree — we reuse that script
      # unmodified rather than fork the build.
      - if: steps.guard.outputs.skip != 'true'
        name: Stamp nightly version
        id: stamp
        run: |
          BASE=$(jq -r .version npm/package.json)
          V="$BASE-nightly.$(date -u +%Y%m%d).$(git rev-parse --short HEAD)"
          sed -i -E "s/(R3_VERSION = \")[^\"]*(\")/\1$V\2/" shared/version.ts
          jq --arg v "$V" '.version = $v' npm/package.json > npm/package.json.tmp
          mv npm/package.json.tmp npm/package.json
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - if: steps.guard.outputs.skip != 'true'
        name: Build nightly binaries
        run: bun scripts/release-binaries.ts

      - if: steps.guard.outputs.skip != 'true'
        name: Smoke-test the built artifact
        run: |
          test "$(grep -c . dist/SHA256SUMS)" = 4
          chmod +x dist/r3-linux-x64
          ./dist/r3-linux-x64 --help

      # Move the `nightly` tag to this commit and republish the pre-release fresh
      # (delete-and-recreate resets its timestamp + notes). The tag is `nightly`,
      # which does NOT match `v*`, so it can never trigger release.yml.
      # --prerelease --latest=false keep it off the repo's "Latest" badge.
      - if: steps.guard.outputs.skip != 'true'
        name: Publish rolling nightly pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ steps.stamp.outputs.version }}
        run: |
          git tag -f nightly
          git push -f origin refs/tags/nightly
          gh release delete nightly --yes >/dev/null 2>&1 || true
          gh release create nightly dist/* --prerelease --latest=false \
            --title "Nightly $V" \
            --notes "Automated nightly build of ${GITHUB_SHA}. Not for production. Download the asset for your platform and run it directly, or point the launcher at it with R3_BINARY=/path/to/r3."
