name: Deploy demo to Pages

# Build the frontend-only demo (web/demo/ + the baked fixtures) and publish it to
# GitHub Pages. The demo is a static SPA whose "backend" runs entirely in the
# browser (localStorage store, pre-baked Shiki HTML, a scripted agent) — no
# daemon, no git — so it hosts anywhere static. See scripts/build-demo.ts.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    # Only rebuild when something the demo bundles changes — the SPA, the shared
    # contract, the baked fixtures / build scripts, or this workflow.
    paths:
      - web/**
      - shared/**
      - scripts/build-demo.ts
      - scripts/gen-demo-fixtures.ts
      - bunfig.toml
      - bun.lock
      - package.json
      - .github/workflows/pages.yml
  workflow_dispatch: {}

# Least privilege: read the repo, plus the Pages deploy tokens (id-token is the
# OIDC handshake the deploy uses to prove it's this workflow).
permissions:
  contents: read
  pages: write
  id-token: write

# One live site at a time — but never cancel an in-flight publish (a half-deployed
# Pages site is worse than a slightly stale one).
concurrency:
  group: pages
  cancel-in-progress: false

# `shell: bash` (vs the unspecified default) adds -o pipefail.
defaults:
  run:
    shell: bash

# Third-party actions are pinned to commit SHAs (the trailing comment is the tag):
# a tag can be force-moved to malicious code, a SHA can't. Matches CI's pins.
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The demo mounts under <project page>/demo — e.g. …/r3/demo/. This one
    # constant feeds both the build's base and the staging sub-folder so they
    # can't drift.
    env:
      DEMO_SUBDIR: demo
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false # nothing here pushes

      # Pin Bun to the dev-shell version so the demo bundles identically to local.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      # Reports the base path the site is served under (/r3 for a project page),
      # so the demo's asset URLs + router are built for that exact sub-path.
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      # Base = <project page path>/<subdir>, e.g. /r3/demo. build-demo bakes it
      # into publicPath (asset URLs) + __R3_BASE__ (the router).
      - name: Build demo
        env:
          R3_DEMO_BASE: ${{ steps.pages.outputs.base_path }}/${{ env.DEMO_SUBDIR }}
        run: |
          bun run gen:demo
          bun run build:demo

      # Arrange dist/pages: the build under /<subdir>/, plus a site-root 404.html
      # (SPA deep-link fallback) and a root→demo redirect. See stage-pages.ts.
      - name: Stage Pages site
        env:
          R3_DEMO_SUBDIR: ${{ env.DEMO_SUBDIR }}
        run: bun run stage:pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
