name: CI

# Fast checks on every PR and every push to main: typecheck + lint/format + a
# single-target build smoke. This is the gate to require as a status check on
# `main`; the full 4-target cross-compile is deliberately left to release.yml /
# nightly.yml so PRs stay quick.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref — stale PR checks are worthless.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# `shell: bash` (vs the unspecified default) adds -o pipefail.
defaults:
  run:
    shell: bash

# Third-party actions are pinned to commit SHAs (the trailing comment is the
# tag): a tag can be force-moved to malicious code, a SHA can't.
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false # nothing here pushes

      # Pin Bun to the dev-shell version: Bun.build({compile}) embeds the Bun
      # runtime at the *running* Bun's version, so an unpinned Bun would silently
      # change what ships. Bump this deliberately alongside local upgrades.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # biome isn't a devDependency (it comes from the nix shell); run the
      # version pinned by biome.jsonc's $schema so CI matches local.
      - name: Lint + format check
        run: bunx @biomejs/biome@2.4.15 check .

      # Build smoke: compile the host-target binary and confirm it execs. The CLI
      # has --help (no --version), so use that as the exit-0 probe.
      - name: Build smoke
        run: |
          bun scripts/compile.ts
          ./r3 --help
